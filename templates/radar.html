<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radar Oylut</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand">OYLUT</div>
      <h1>Radar</h1>
    </div>
    <form method="post" action="/sair">
      <button class="secondary" type="submit">Sair</button>
    </form>
  </header>

  <main class="radar-shell">
    <p class="user">Acesso: {{ email }}</p>

    <section class="control-panel">
      <h2>Período das notícias</h2>
      <div class="periods" role="radiogroup" aria-label="Escolha o período">
        {% for hora in [1, 2, 6, 12, 24] %}
          <label>
            <input type="radio" name="horas" value="{{ hora }}" {% if hora == 24 %}checked{% endif %}>
            <span>{{ hora }}h</span>
          </label>
        {% endfor %}
      </div>
      <button id="iniciar" type="button">Iniciar</button>
    </section>

    <section aria-live="polite">
      <div id="status" class="status"></div>
      <ol id="resultados" class="results"></ol>
    </section>
  </main>

  <script>
    const button = document.getElementById('iniciar');
    const status = document.getElementById('status');
    const results = document.getElementById('resultados');

    button.addEventListener('click', async () => {
      const selected = document.querySelector('input[name="horas"]:checked');
      const horas = selected ? selected.value : '24';
      button.disabled = true;
      status.textContent = 'Buscando notícias...';
      results.innerHTML = '';

      try {
        const response = await fetch(`/radar?horas=${encodeURIComponent(horas)}`);
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }
        if (!response.ok) throw new Error('Falha ao executar o Radar.');

        const links = await response.json();
        status.textContent = `${links.length} notícia(s) encontrada(s).`;

        for (const link of links) {
          const item = document.createElement('li');
          const anchor = document.createElement('a');
          anchor.href = link;
          anchor.target = '_blank';
          anchor.rel = 'noopener noreferrer';
          anchor.textContent = link;
          item.appendChild(anchor);
          results.appendChild(item);
        }
      } catch (error) {
        status.textContent = error.message || 'Não foi possível carregar as notícias.';
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
