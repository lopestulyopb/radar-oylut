<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nova senha | Radar Oylut</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><main class="login-card"><div class="brand">OYLUT</div><h1>Criar nova senha</h1><p class="subtitle">Digite e confirme sua nova senha.</p>{% if erro %}<p class="error" role="alert">{{ erro }}</p>{% endif %}<p id="tokenError" class="error" role="alert" hidden>O link de recuperação é inválido ou expirou. Solicite um novo link.</p><form id="resetForm" method="post" action="/redefinir-senha" class="login-form"><input id="access_token" name="access_token" type="hidden"><label for="senha">Nova senha</label><input id="senha" name="senha" type="password" autocomplete="new-password" minlength="8" required><label for="confirmar_senha">Confirmar nova senha</label><input id="confirmar_senha" name="confirmar_senha" type="password" autocomplete="new-password" minlength="8" required><button type="submit">Atualizar senha</button></form><div class="auth-footer"><a href="/esqueci-senha">Solicitar outro link</a></div></main><script>const p=new URLSearchParams(location.hash.replace(/^#/,''));const t=p.get('access_token');const f=document.getElementById('resetForm');if(!t){f.hidden=true;document.getElementById('tokenError').hidden=false}else{document.getElementById('access_token').value=t;history.replaceState(null,'',location.pathname)}</script></body></html>
