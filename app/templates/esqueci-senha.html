<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Recuperar senha | Radar Oylut</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><main class="login-card"><div class="brand">OYLUT</div><h1>Recuperar senha</h1><p class="subtitle">Enviaremos um link para você criar uma nova senha.</p>{% if mensagem %}<p class="success" role="status">{{ mensagem }}</p>{% endif %}{% if erro %}<p class="error" role="alert">{{ erro }}</p>{% endif %}<form method="post" action="/esqueci-senha" class="login-form"><label for="email">E-mail</label><input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required><button type="submit">Enviar link</button></form><div class="auth-footer"><a href="/login">Voltar para o login</a></div></main></body></html>
