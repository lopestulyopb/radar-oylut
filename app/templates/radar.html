<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Radar Oylut</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <div>
      <div class="brand">OYLUT</div>
      <h1>Radar</h1>
    </div>
    <form method="post" action="/sair">
      <button class="secondary" type="submit">Sair</button>
    </form>
  </header>

  <main class="radar-shell">
    <p class="user">Acesso: {{ email }}</p>

    <section class="control-panel">
      <h2>Período das notícias</h2>
      <div class="periods" role="radiogroup" aria-label="Escolha o período">
        {% for hora in [1, 2, 6, 12, 24] %}
          <label>
            <input type="radio" name="horas" value="{{ hora }}" {% if hora == 24 %}checked{% endif %}>
            <span>{{ hora }}h</span>
          </label>
        {% endfor %}
      </div>
      <button id="iniciar" type="button">Iniciar</button>
    </section>

    <section aria-live="polite">
      <div id="status" class="status"></div>
      <div id="resultados" class="results"></div>
    </section>
  </main>

  <script>
    const button = document.getElementById('iniciar');
    const status = document.getElementById('status');
    const results = document.getElementById('resultados');

    function createText(tag, className, text) {
      const element = document.createElement(tag);
      if (className) element.className = className;
      element.textContent = text;
      return element;
    }

    button.addEventListener('click', async () => {
      const selected = document.querySelector('input[name="horas"]:checked');
      const horas = selected ? selected.value : '24';
      button.disabled = true;
      status.textContent = 'Buscando, analisando e organizando notícias...';
      results.innerHTML = '';

      try {
        const response = await fetch(`/radar?horas=${encodeURIComponent(horas)}`);
        if (response.status === 401) {
          window.location.href = '/login';
          return;
        }
        if (!response.ok) throw new Error('Falha ao executar o Radar.');

        const noticias = await response.json();
        status.textContent = `${noticias.length} notícia(s) encontrada(s), sem duplicações.`;

        noticias.forEach((noticia, index) => {
          const article = document.createElement('article');
          article.className = 'news-card';

          const meta = document.createElement('div');
          meta.className = 'news-meta';
          meta.appendChild(createText('span', 'rank', `${index + 1}`));
          meta.appendChild(createText('span', 'section-badge', noticia.editoria));
          meta.appendChild(createText('span', 'source', noticia.fonte));
          article.appendChild(meta);

          const title = document.createElement('h2');
          const link = document.createElement('a');
          link.href = noticia.link;
          link.target = '_blank';
          link.rel = 'noopener noreferrer';
          link.textContent = noticia.titulo;
          title.appendChild(link);
          article.appendChild(title);

          article.appendChild(createText('p', 'summary', noticia.resumo));

          const footer = document.createElement('div');
          footer.className = 'news-footer';
          footer.appendChild(createText('span', 'weight', `Peso jornalístico: ${noticia.peso}`));
          const openLink = document.createElement('a');
          openLink.href = noticia.link;
          openLink.target = '_blank';
          openLink.rel = 'noopener noreferrer';
          openLink.textContent = 'Abrir notícia';
          footer.appendChild(openLink);
          article.appendChild(footer);

          results.appendChild(article);
        });
      } catch (error) {
        status.textContent = error.message || 'Não foi possível carregar as notícias.';
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
