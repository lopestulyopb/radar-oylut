<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Criar conta | Radar Oylut</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><main class="login-card"><div class="brand">OYLUT</div><h1>Criar conta</h1><p class="subtitle">Cadastre-se para acessar o Radar Oylut.</p>{% if erro %}<p class="error" role="alert">{{ erro }}</p>{% endif %}<form method="post" action="/cadastro" class="login-form"><label for="nome">Nome</label><input id="nome" name="nome" type="text" value="{{ nome or '' }}" autocomplete="name" minlength="2" maxlength="120" required><label for="email">E-mail</label><input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required><label for="senha">Senha</label><input id="senha" name="senha" type="password" autocomplete="new-password" minlength="8" required><p class="field-help">Use pelo menos 8 caracteres.</p><label for="confirmar_senha">Confirmar senha</label><input id="confirmar_senha" name="confirmar_senha" type="password" autocomplete="new-password" minlength="8" required><button type="submit">Criar conta</button></form><div class="auth-footer"><span>Já tem uma conta?</span><a href="/login">Entrar</a></div></main></body></html>
