<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Entrar | Radar Oylut</title><link rel="stylesheet" href="/static/style.css"></head><body class="login-body"><main class="login-card"><div class="brand">OYLUT</div><h1>Radar Oylut</h1><p class="subtitle">Entre para acessar o radar jornalístico.</p>{% if mensagem %}<p class="success" role="status">{{ mensagem }}</p>{% endif %}{% if erro %}<p class="error" role="alert">{{ erro }}</p>{% endif %}<form method="post" action="/login" class="login-form"><label for="email">E-mail</label><input id="email" name="email" type="email" value="{{ email or '' }}" autocomplete="email" required><label for="senha">Senha</label><input id="senha" name="senha" type="password" autocomplete="current-password" required><div class="form-link-row"><a href="/esqueci-senha">Esqueci minha senha</a></div><button type="submit">Entrar</button></form><div class="auth-footer"><span>Ainda não tem uma conta?</span><a href="/cadastro">Criar conta</a></div></main></body></html>
