<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Feedback | Radar Oylut</title><link rel="stylesheet" href="/static/style.css?v=20260724-3"><link rel="stylesheet" href="/static/support.css?v=20260724-1"></head><body><header class="topbar"><div class="topbar-title"><a class="back-link" href="/" aria-label="Voltar ao Radar">←</a><div><div class="brand">OYLUT</div><h1>Feedback</h1></div></div></header><main class="support-shell"><section class="support-card"><p class="support-intro">Encontrou um erro? Envie a notícia para ajudar a melhorar o Radar.</p><form class="support-form" action="/feedback" method="POST"><label for="feedback-type">Tipo do feedback</label><select id="feedback-type" name="feedback_type" required><option value="">Selecione</option><option value="editoria_incorreta">Editoria incorreta</option><option value="noticia_duplicada">Notícia duplicada</option><option value="noticia_ausente">Notícia ausente</option><option value="outro">Outro</option></select><label for="feedback-news">Cole a notícia</label><textarea id="feedback-news" name="news_text" rows="12" required placeholder="Cole aqui a notícia copiada do Radar ou as informações que ajudem a identificar o problema."></textarea><label for="feedback-comment">Comentário <span class="optional">(opcional)</span></label><textarea id="feedback-comment" name="comment" rows="5" placeholder="Exemplo: acredito que deveria ser Policial e não Geral."></textarea><button type="submit">Enviar feedback</button></form><p class="support-contact">O relato será registrado para análise da equipe do Radar.</p></section></main></body></html>
