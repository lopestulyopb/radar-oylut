<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback | Radar Oylut</title>
  <link rel="stylesheet" href="/static/style.css?v=20260724-3">
</head>
<body>
  <header class="topbar">
    <div class="topbar-title"><a class="back-link" href="/" aria-label="Voltar ao Radar">←</a><div><div class="brand">OYLUT</div><h1>Feedback</h1></div></div>
  </header>
  <main class="support-shell">
    <section class="support-card">
      <p class="support-intro">Encontrou um erro? Envie a notícia para ajudar a melhorar o Radar.</p>
      <form class="support-form" action="https://formsubmit.co/radar.oylut@gmail.com" method="POST">
        <input type="hidden" name="_subject" value="[RADAR] Novo feedback">
        <input type="hidden" name="_template" value="table">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_next" value="https://radar-oylut.onrender.com/static/mensagem-enviada.html">
        <input type="hidden" id="feedback-user" name="Usuário" value="Não identificado">
        <input type="hidden" id="feedback-date" name="Data e hora">
        <input type="hidden" id="feedback-browser" name="Navegador">
        <input type="hidden" name="Versão" value="Radar Oylut 6.5">

        <label for="feedback-type">Tipo do feedback</label>
        <select id="feedback-type" name="Tipo" required>
          <option value="">Selecione</option>
          <option>Editoria incorreta</option>
          <option>Notícia duplicada</option>
          <option>Notícia ausente</option>
          <option>Outro</option>
        </select>

        <label for="feedback-news">Cole a notícia</label>
        <textarea id="feedback-news" name="Notícia" rows="12" required placeholder="Cole aqui a notícia copiada do Radar ou as informações que ajudem a identificar o problema."></textarea>

        <label for="feedback-comment">Comentário <span class="optional">(opcional)</span></label>
        <textarea id="feedback-comment" name="Comentário" rows="5" placeholder="Exemplo: acredito que deveria ser Policial e não Geral."></textarea>

        <button type="submit">Enviar feedback</button>
      </form>
      <p class="support-contact">Os relatos são encaminhados para <strong>radar.oylut@gmail.com</strong>.</p>
    </section>
  </main>
  <script>
    const params=new URLSearchParams(location.search);
    const email=params.get('email');
    if(email)document.getElementById('feedback-user').value=email;
    document.getElementById('feedback-date').value=new Date().toLocaleString('pt-BR');
    document.getElementById('feedback-browser').value=navigator.userAgent;
    const type=document.getElementById('feedback-type');
    const subject=document.querySelector('input[name="_subject"]');
    type.addEventListener('change',()=>{subject.value=`[RADAR] Feedback - ${type.value||'Novo relato'}`});
  </script>
</body>
</html>
